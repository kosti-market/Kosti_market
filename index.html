<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Bags | الفخامة اليدوية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;900&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #070707; --card: #111111; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--dark); color: #fff; overflow-x: hidden; }
        .serif { font-family: 'Amiri', serif; }

        /* ستايل المتجر الشامل */
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .product-card { transition: 0.6s cubic-bezier(0.22, 1, 0.36, 1); border: 1px solid transparent; }
        .product-card:hover { transform: translateY(-15px); border-color: var(--gold); box-shadow: 0 30px 60px rgba(0,0,0,0.8); }

        /* حاوية الصور بالسحب */
        .swipe-container {
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
            scrollbar-width: none; -ms-overflow-style: none; cursor: grab;
        }
        .swipe-container::-webkit-scrollbar { display: none; }
        .swipe-item { min-width: 100%; scroll-snap-align: center; position: relative; }

        /* زر الرجوع الذكي */
        .back-btn {
            position: fixed; top: 30px; right: 30px; z-index: 250;
            background: var(--gold); color: #000; padding: 12px 25px;
            border-radius: 50px; font-weight: 900; font-size: 14px;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
            display: flex; items-center: center; gap: 8px; transition: 0.4s;
        }
        .back-btn:hover { transform: scale(1.1); filter: brightness(1.1); }

        /* النقاط التوضيحية للسلايدر */
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: 0.3s; }
        .dot.active { background: var(--gold); width: 25px; }

        .hidden-admin { display: none; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-[100] px-10 py-6 flex justify-between items-center glass border-b border-white/5">
        <div class="serif text-3xl font-black text-gold">BEST BAGS</div>
        <div class="hidden md:flex gap-10 text-[11px] font-bold uppercase tracking-widest text-gray-400">
            <a href="#gallery" class="hover:text-gold transition">المعرض</a>
            <a href="https://wa.me/249900623733" class="hover:text-gold transition">خدمة العملاء</a>
        </div>
    </nav>

    <section class="h-[75vh] flex flex-col justify-center items-center text-center px-6 pt-20">
        <h1 class="serif text-6xl md:text-9xl mb-6 reveal">إرث <span class="text-gold italic">الجمال</span></h1>
        <p class="text-gray-500 tracking-[0.4em] text-xs uppercase mb-10">Best Bags: ندرة الجلد.. دقة اليد</p>
        <a href="#gallery" class="border border-gold text-gold px-12 py-4 rounded-full text-xs font-bold hover:bg-gold hover:text-black transition duration-500">استكشف المجموعة</a>
    </section>

    <section id="gallery" class="py-20 max-w-7xl mx-auto px-6">
        <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-16"></div>
    </section>

    <section id="adminZone" class="hidden-admin py-32 bg-[#050505]">
        <div class="max-w-3xl mx-auto glass p-12 rounded-[3rem]">
            <div class="flex justify-between items-center mb-10">
                <h2 class="serif text-3xl text-gold">إدارة المحتوى</h2>
                <button onclick="handleLogout()" class="text-[10px] border border-red-500/50 text-red-500 px-6 py-2 rounded-full">تسجيل خروج</button>
            </div>
            <div class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="text" id="pName" placeholder="اسم الحقيبة" class="bg-white/5 p-5 rounded-2xl outline-none">
                    <input type="number" id="pPrice" placeholder="السعر" class="bg-white/5 p-5 rounded-2xl outline-none">
                </div>
                <textarea id="pDesc" placeholder="وصف القطعة..." class="w-full bg-white/5 p-5 rounded-2xl h-40 outline-none"></textarea>
                <input type="file" id="pFiles" multiple class="block w-full text-xs text-gray-500">
                <button onclick="uploadProduct()" id="uploadBtn" class="w-full py-5 bg-gold text-black rounded-2xl font-black">إضافة المنتج</button>
            </div>
        </div>
    </section>

    <footer class="py-20 text-center opacity-20 text-[10px] tracking-[1.5em] relative">
        BEST BAGS LUXURY
        <div onclick="showLogin()" class="absolute bottom-10 left-1/2 -translate-x-1/2 w-3 h-3 cursor-pointer"></div>
    </footer>

    <div id="productModal" class="fixed inset-0 z-[200] hidden bg-[#050505] overflow-y-auto">
        <button onclick="closeModal()" class="back-btn">
            <span>الرجوع للمعرض</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>

        <div class="max-w-6xl mx-auto min-h-screen flex flex-col lg:flex-row items-center gap-16 p-8 pt-32 lg:pt-10">
            <div class="w-full lg:w-3/5">
                <div class="relative rounded-[3rem] overflow-hidden shadow-2xl bg-white/5">
                    <div id="swipeGallery" class="swipe-container" onscroll="updateDots()">
                        </div>
                    <div id="dotContainer" class="absolute bottom-10 left-1/2 -translate-x-1/2 flex gap-3 z-10"></div>
                </div>
                <p class="text-center text-[10px] text-gray-600 mt-6 tracking-widest uppercase">اسحب الصور لليمين أو اليسار للمزيد</p>
            </div>

            <div class="w-full lg:w-2/5 space-y-8">
                <div class="space-y-2">
                    <h2 id="modalTitle" class="serif text-5xl md:text-6xl text-gold leading-tight"></h2>
                    <p id="modalPrice" class="text-3xl font-black text-gray-300"></p>
                </div>
                <div class="glass p-8 rounded-[2.5rem] border-white/10 leading-relaxed text-lg text-gray-400 font-light" id="modalDesc"></div>
                
                <div class="flex flex-col gap-5">
                    <button id="orderWA" class="w-full py-6 bg-gold text-black rounded-3xl font-black text-sm uppercase tracking-widest shadow-2xl hover:scale-[1.02] transition">اطلب الآن عبر واتساب</button>
                    <div class="flex gap-4">
                        <button id="shareBtn" class="flex-1 py-4 glass rounded-2xl text-[10px] font-bold uppercase tracking-widest hover:bg-white/10 transition">مشاركة</button>
                        <button id="saveBtn" class="flex-1 py-4 glass rounded-2xl text-[10px] font-bold uppercase tracking-widest hover:bg-white/10 transition">حفظ الصورة</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="loginModal" class="fixed inset-0 z-[300] hidden bg-black/98 flex items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <h3 class="serif text-2xl mb-10 text-gold uppercase tracking-widest">Master Key</h3>
            <input type="email" id="admEmail" placeholder="EMAIL" class="w-full bg-white/5 p-5 rounded-2xl mb-4 text-center outline-none border border-white/5 focus:border-gold">
            <input type="password" id="admPass" placeholder="PASSWORD" class="w-full bg-white/5 p-5 rounded-2xl mb-10 text-center outline-none border border-white/5 focus:border-gold">
            <button onclick="handleLogin()" class="w-full py-5 bg-gold text-black rounded-full font-black">UNLOCK</button>
            <button onclick="hideLogin()" class="mt-6 text-gray-700 text-xs uppercase">Cancel</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://bxbglomvulnzehruubdh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4Ymdsb212dWxuemVocnV1YmRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mzg5MDYsImV4cCI6MjA5MjUxNDkwNn0.rqIZHvP47QugH9vG0LW8OkkmAVYEzhOwv-VUKJuEqOY';
        const _client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let products = [];
        let currentImgs = [];

        async function handleLogin() {
            const { error } = await _client.auth.signInWithPassword({
                email: document.getElementById('admEmail').value,
                password: document.getElementById('admPass').value
            });
            if (error) alert("Access Denied"); else location.reload();
        }

        async function handleLogout() { await _client.auth.signOut(); location.reload(); }
        function showLogin() { document.getElementById('loginModal').style.display = 'flex'; }
        function hideLogin() { document.getElementById('loginModal').style.display = 'none'; }

        function openModal(id) {
            const p = products.find(x => x.id == id);
            currentImgs = p.images;
            
            // حقن الصور في السلايدر
            const gallery = document.getElementById('swipeGallery');
            gallery.innerHTML = p.images.map(img => `
                <div class="swipe-item">
                    <img src="${img}" class="w-full h-full object-cover">
                </div>
            `).join('');

            // حقن النقاط
            const dotCont = document.getElementById('dotContainer');
            dotCont.innerHTML = p.images.map((_, i) => `<div class="dot ${i==0?'active':''}"></div>`).join('');

            document.getElementById('modalTitle').innerText = p.name;
            document.getElementById('modalPrice').innerText = `${p.price} SDG`;
            document.getElementById('modalDesc').innerText = p.description || "قطعة يدوية حصرية من أفضل أنواع الجلود السودانية.";
            
            document.getElementById('orderWA').onclick = () => {
                const msg = encodeURIComponent(`مرحباً Best Bags، أود طلب:\n\nالمنتج: ${p.name}\nالسعر: ${p.price} SDG`);
                window.open(`https://wa.me/249900623733?text=${msg}`);
            };

            document.getElementById('shareBtn').onclick = () => {
                navigator.share({ title: p.name, url: window.location.href });
            };

            document.getElementById('saveBtn').onclick = async () => {
                const scrollLeft = gallery.scrollLeft;
                const index = Math.round(scrollLeft / gallery.clientWidth);
                const res = await fetch(currentImgs[index]);
                const b = await res.blob();
                const l = document.createElement('a'); l.href = URL.createObjectURL(b); l.download = `${p.name}.jpg`; l.click();
            };

            document.getElementById('productModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
            gallery.scrollLeft = 0;
        }

        function updateDots() {
            const gallery = document.getElementById('swipeGallery');
            const dots = document.querySelectorAll('.dot');
            const index = Math.round(gallery.scrollLeft / gallery.clientWidth);
            dots.forEach((dot, i) => {
                if(i === index) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        }

        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        async function uploadProduct() {
            const btn = document.getElementById('uploadBtn');
            const files = document.getElementById('pFiles').files;
            btn.innerText = "جاري الحفظ...";
            try {
                let urls = [];
                for (let f of files) {
                    const n = `${Date.now()}_${f.name}`;
                    await _client.storage.from('product-images').upload(n, f);
                    const { data } = _client.storage.from('product-images').getPublicUrl(n);
                    urls.push(data.publicUrl);
                }
                await _client.from('products').insert([{
                    name: document.getElementById('pName').value,
                    price: document.getElementById('pPrice').value,
                    description: document.getElementById('pDesc').value,
                    images: urls
                }]);
                location.reload();
            } catch (e) { alert("Error"); }
        }

        async function init() {
            const { data } = await _client.from('products').select('*').order('created_at', {ascending: false});
            products = data || [];
            const grid = document.getElementById('productsGrid');
            const sess = await _client.auth.getSession();
            const isAdmin = sess.data.session;

            grid.innerHTML = products.map(p => `
                <div class="product-card rounded-[3.5rem] p-5 bg-[#0e0e0e] relative group">
                    <div class="aspect-[4/5] rounded-[3rem] overflow-hidden cursor-pointer relative shadow-2xl" onclick="openModal('${p.id}')">
                        <img src="${p.images[0]}" class="w-full h-full object-cover transition duration-1000 group-hover:scale-110">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center backdrop-blur-sm">
                            <span class="text-[9px] uppercase tracking-[0.4em] border-2 border-gold/50 text-gold px-8 py-3 rounded-full font-black">اكتشف القطعة</span>
                        </div>
                    </div>
                    <div class="pt-8 px-4 flex justify-between items-start">
                        <div>
                            <h3 class="serif text-2xl mb-1">${p.name}</h3>
                            <p class="text-gold font-bold text-sm tracking-widest">${p.price} SDG</p>
                        </div>
                        ${isAdmin ? `<button onclick="deleteP('${p.id}')" class="text-red-900 text-[10px] underline">حذف</button>` : ''}
                    </div>
                </div>
            `).join('');

            if(isAdmin) document.getElementById('adminZone').classList.remove('hidden-admin');
        }

        async function deleteP(id) { if(confirm("حذف؟")) { await _client.from('products').delete().eq('id', id); location.reload(); } }

        init();
    </script>
</body>
</html>
