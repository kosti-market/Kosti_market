<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSTI MARKET ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1e40af; --accent: #f59e0b; }
        body { font-family: 'Cairo', sans-serif; transition: 0.3s; }
        .dark-mode { background-color: #0f172a; color: white; }
        .dark-mode .bg-white { background-color: #1e293b !important; color: white; border-color: #334155; }
        .product-card { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: scale(1.03) rotateY(5deg); z-index: 10; }
        .neon-border { box-shadow: 0 0 15px rgba(30, 64, 175, 0.3); }
        .shimmer { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); background-size: 200% 100%; animation: shimmer 2s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="bg-gray-50">

    <header class="sticky top-0 z-[100] bg-white/70 backdrop-blur-xl border-b border-gray-200">
        <div class="container mx-auto px-4 py-4 flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <h1 class="text-3xl font-black tracking-tighter text-blue-900 dark:text-blue-400">KOSTI<span class="text-amber-500">MARKET</span></h1>
                <div class="relative hidden lg:block">
                    <input type="text" id="main-search" onkeyup="smartSearch()" placeholder="ابحث عن سيارة، هاتف، أو ملابس..." class="bg-gray-100 border-none rounded-2xl py-2 px-10 w-[400px] focus:ring-2 focus:ring-blue-500">
                    <span class="absolute right-3 top-2.5 opacity-40">🔍</span>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="toggleDarkMode()" class="p-2 bg-gray-100 rounded-xl hover:bg-gray-200 transition">🌙</button>
                <div onclick="showPage('vendor')" class="cursor-pointer flex items-center gap-2 bg-blue-900 text-white px-5 py-2 rounded-2xl shadow-lg hover:shadow-blue-500/40 transition-all">
                    <span class="text-sm font-bold">لوحة التاجر</span>
                    <div class="w-2 h-2 bg-green-400 rounded-full animate-ping"></div>
                </div>
            </div>
        </div>
    </header>

    <div class="container mx-auto px-4 py-6">
        <div class="relative h-[250px] rounded-[3rem] overflow-hidden group shadow-2xl">
            <div class="absolute inset-0 bg-gradient-to-l from-blue-900 to-transparent z-10"></div>
            <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1200" class="w-full h-full object-cover group-hover:scale-110 transition duration-1000">
            <div class="absolute inset-y-0 right-10 flex flex-col justify-center z-20 text-white animate__animated animate__fadeInRight">
                <h2 class="text-4xl font-black mb-2">سوق كوستي في جيبك</h2>
                <p class="text-amber-400 font-bold mb-6 italic">أكبر تجمع للتجار والوسطاء في ولاية النيل الأبيض</p>
                <button class="bg-amber-500 w-fit px-8 py-3 rounded-full font-black text-blue-900 hover:scale-105 transition">ابدأ التسوق</button>
            </div>
        </div>
    </div>

    <div class="container mx-auto px-4 mb-8">
        <div class="flex gap-4 overflow-x-auto pb-4 no-scrollbar">
            <div onclick="filterBy('all')" class="cursor-pointer group flex flex-col items-center min-w-[90px]">
                <div class="w-16 h-16 bg-white rounded-3xl shadow-sm flex items-center justify-center text-3xl group-hover:bg-blue-600 transition-all">🏗️</div>
                <span class="text-[10px] font-bold mt-2 uppercase">الكل</span>
            </div>
            <div onclick="filterBy('cars')" class="cursor-pointer group flex flex-col items-center min-w-[90px]">
                <div class="w-16 h-16 bg-white rounded-3xl shadow-sm flex items-center justify-center text-3xl group-hover:bg-blue-600 transition-all">🏎️</div>
                <span class="text-[10px] font-bold mt-2 uppercase">سيارات</span>
            </div>
            </div>
    </div>

    <main id="user-page" class="container mx-auto px-4 grid grid-cols-2 lg:grid-cols-4 gap-6 pb-32">
        </main>

    <section id="vendor-page" class="hidden fixed inset-0 z-[200] bg-gray-50 overflow-y-auto">
        <div class="container mx-auto px-4 py-8">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-black text-blue-900">إدارة أعمالك <span class="text-gray-400 text-sm font-normal">/ لوحة التحكم</span></h2>
                <button onclick="showPage('user')" class="bg-white border p-3 rounded-2xl font-bold">العودة للمتجر 🛒</button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1 bg-blue-900 rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden">
                    <div class="relative z-10">
                        <p class="opacity-60 text-sm">صافي أرباحك المتوقع</p>
                        <h3 id="net-profit" class="text-4xl font-black mt-2">0 <small class="text-xs">ج.س</small></h3>
                        <div class="mt-8 flex gap-4">
                            <div class="bg-white/10 p-4 rounded-2xl flex-1">
                                <p class="text-[10px] opacity-60">العمولات المستقطعة</p>
                                <p id="total-comm" class="font-bold">0</p>
                            </div>
                            <div class="bg-white/10 p-4 rounded-2xl flex-1">
                                <p class="text-[10px] opacity-60">عدد الطلبات</p>
                                <p class="font-bold text-amber-400">0</p>
                            </div>
                        </div>
                    </div>
                    <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
                </div>

                <div class="lg:col-span-2 bg-white rounded-[2.5rem] p-8 shadow-sm border border-gray-100">
                    <h4 class="text-xl font-bold mb-6">أضف منتج جديد للسوق</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <input type="text" id="v-name" placeholder="اسم المنتج (مثلاً: بوكسي 2022)" class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-100 focus:ring-2 focus:ring-blue-600">
                        <input type="number" id="v-price" placeholder="سعرك الخاص (ج.س)" class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-100 focus:ring-2 focus:ring-blue-600">
                        <select id="v-cat" onchange="toggleCarSpecs()" class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-100 font-bold">
                            <option value="phones">هواتف</option>
                            <option value="clothes">ملابس</option>
                            <option value="cars">سيارات ومحركات</option>
                            <option value="electric">أدوات كهربائية</option>
                        </select>
                        <input type="text" id="v-img" placeholder="رابط صورة المنتج" class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-100 focus:ring-2 focus:ring-blue-600">
                    </div>

                    <div id="car-specs" class="hidden mt-6 p-6 bg-blue-50 rounded-3xl grid grid-cols-2 gap-4">
                        <input type="text" id="v-model" placeholder="الموديل (مثلاً: 2024)" class="p-3 rounded-xl border-none bg-white">
                        <input type="text" id="v-km" placeholder="الممشى (كم)" class="p-3 rounded-xl border-none bg-white">
                    </div>

                    <button onclick="saveAndPublish()" class="w-full mt-8 bg-blue-600 text-white py-5 rounded-2xl font-black text-xl shadow-xl shadow-blue-200 hover:bg-blue-700 transition-all">نشر المنتج في كوستي ماركت</button>
                </div>
            </div>
        </div>
    </section>

    <div id="action-bar" class="fixed bottom-6 inset-x-0 mx-auto w-[90%] md:w-[600px] h-20 glass-panel bg-white/80 backdrop-blur-2xl rounded-[2.5rem] border border-white/20 shadow-2xl z-[150] flex items-center justify-between px-8">
        <div class="flex flex-col">
            <span class="text-[10px] font-black text-gray-400 uppercase">إجمالي المشتريات</span>
            <span id="total-price" class="text-2xl font-black text-blue-900">0 ج.س</span>
        </div>
        <button onclick="checkout()" class="bg-green-500 text-white px-10 py-3 rounded-2xl font-black shadow-lg shadow-green-200 hover:scale-105 active:scale-95 transition-all">إتمام الطلب</button>
    </div>

    <script>
        let db = [
            { id: 1, name: "تويوتا برادو 2024", price: 45000000, cat: "cars", model: "2024", km: "0", img: "https://images.unsplash.com/photo-1594502184342-2e12f877aa73?w=500" },
            { id: 2, name: "آيفون 15 برو", price: 900000, cat: "phones", img: "https://images.unsplash.com/photo-1696446701796-da61225697cc?w=500" }
        ];

        let cart = [];
        const commission = 0.10;

        function render(items) {
            const grid = document.getElementById('user-page');
            grid.innerHTML = '';
            items.forEach(p => {
                const final = Math.round(p.price * (1 + commission));
                grid.innerHTML += `
                    <div class="product-card bg-white rounded-[2.5rem] p-4 shadow-sm border border-gray-100 relative group overflow-hidden">
                        <div class="relative h-48 mb-4 overflow-hidden rounded-[2rem]">
                            <img src="${p.img}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-125">
                            ${p.cat === 'cars' ? `<span class="absolute top-3 right-3 bg-amber-500 text-white text-[10px] px-3 py-1 rounded-full font-bold">موديل ${p.model}</span>` : ''}
                        </div>
                        <h4 class="font-bold text-gray-800 mb-1 truncate">${p.name}</h4>
                        <div class="flex justify-between items-end mt-4">
                            <div class="flex flex-col">
                                <span class="text-[10px] text-gray-400 line-through">${p.price.toLocaleString()}</span>
                                <span class="text-xl font-black text-blue-800">${final.toLocaleString()} <small class="text-[10px]">ج.س</small></span>
                            </div>
                            <button onclick="addToCart(${p.id})" class="bg-blue-900 text-white w-12 h-12 rounded-2xl flex items-center justify-center hover:bg-amber-500 transition-colors shadow-lg">
                                <span class="text-2xl">+</span>
                            </button>
                        </div>
                    </div>`;
            });
        }

        function toggleCarSpecs() {
            const cat = document.getElementById('v-cat').value;
            document.getElementById('car-specs').classList.toggle('hidden', cat !== 'cars');
        }

        function showPage(page) {
            document.getElementById('user-page').classList.toggle('hidden', page === 'vendor');
            document.getElementById('vendor-page').classList.toggle('hidden', page === 'user');
            document.getElementById('action-bar').classList.toggle('hidden', page === 'vendor');
        }

        function saveAndPublish() {
            const name = document.getElementById('v-name').value;
            const price = parseFloat(document.getElementById('v-price').value);
            const cat = document.getElementById('v-cat').value;
            const img = document.getElementById('v-img').value || "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500";

            if(!name || !price) return alert("المعلومات غير كاملة!");

            const newP = { id: Date.now(), name, price, cat, img, model: document.getElementById('v-model').value, km: document.getElementById('v-km').value };
            db.unshift(newP);
            render(db);
            updateStats();
            showPage('user');
            alert("تم النشر بنجاح!");
        }

        function updateStats() {
            let totalRaw = 0;
            db.forEach(p => totalRaw += p.price);
            document.getElementById('net-profit').innerText = totalRaw.toLocaleString();
            document.getElementById('total-comm').innerText = Math.round(totalRaw * 0.1).toLocaleString();
        }

        function smartSearch() {
            const term = document.getElementById('main-search').value.toLowerCase();
            const filtered = db.filter(p => p.name.toLowerCase().includes(term));
            render(filtered);
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        function addToCart(id) {
            const p = db.find(x => x.id === id);
            cart.push(p);
            let total = 0;
            cart.forEach(x => total += Math.round(x.price * (1+commission)));
            document.getElementById('total-price').innerText = total.toLocaleString() + " ج.س";
        }

        function checkout() {
            if(cart.length === 0) return alert("سلتك فارغة!");
            let msg = `🛒 *طلب جديد - KOSTI MARKET*\n`;
            let total = 0;
            cart.forEach(p => {
                const f = Math.round(p.price * (1.1));
                msg += `• ${p.name}: ${f.toLocaleString()} ج.س\n`;
                total += f;
            });
            msg += `\n💰 *الإجمالي: ${total.toLocaleString()} ج.س*`;
            window.open(`https://wa.me/249123456789?text=${encodeURIComponent(msg)}`);
        }

        render(db);
        updateStats();
    </script>
</body>
</html>
