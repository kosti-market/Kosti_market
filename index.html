<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSTI MARKET ELITE 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #2563eb; --glass: rgba(255, 255, 255, 0.85); }
        body { font-family: 'Cairo', sans-serif; background: #f0f4f9; color: #1e293b; transition: 0.4s; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.5); border-radius: 2.5rem; }
        
        /* Stories */
        .story-circle { min-width: 70px; height: 70px; border: 3px solid #2563eb; border-radius: 50%; padding: 2px; cursor: pointer; flex-shrink: 0; }
        .story-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .bento-item { transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .bento-item:hover { transform: translateY(-8px); shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        
        .section-view { display: none; opacity: 0; transform: scale(0.98); transition: 0.4s; }
        .section-view.active { display: block; opacity: 1; transform: scale(1); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        #notif { position: fixed; top: 110px; left: 20px; z-index: 1000; transform: translateX(-150%); transition: 0.6s; }
        #notif.show { transform: translateX(0); }
    </style>
</head>
<body class="pb-32">

    <div id="notif" class="glass-panel p-4 flex items-center gap-3 shadow-2xl border-blue-100 max-w-xs">
        <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center">🔔</div>
        <div>
            <p id="notif-text" class="text-xs font-bold text-blue-900 italic">باع تاجر 'كردفان' لابتوب الآن!</p>
        </div>
    </div>

    <header class="sticky top-4 z-[500] container mx-auto px-4">
        <nav class="glass-panel p-3 flex justify-between items-center shadow-xl">
            <h1 class="text-2xl font-[900] text-blue-600 px-4 tracking-tighter" onclick="showSection('all')">KOSTI.M</h1>
            <div class="flex gap-2">
                <button onclick="showSection('vendor')" class="bg-blue-600 text-white px-6 py-2 rounded-2xl font-black shadow-lg shadow-blue-200 hover:scale-105 transition">لوحة التاجر</button>
            </div>
        </nav>
    </header>

    <main class="container mx-auto px-4 mt-8">
        
        <div id="section-all" class="section-view active">
            <section class="mb-8 overflow-x-auto no-scrollbar flex gap-4 py-2" id="story-container">
                <div class="flex flex-col items-center gap-1">
                    <div class="story-circle border-gray-300 flex items-center justify-center text-2xl bg-white" onclick="showSection('vendor')">+</div>
                    <span class="text-[9px] font-bold">إضافة</span>
                </div>
            </section>

            <div class="glass-panel p-8 bg-gradient-to-br from-blue-700 to-indigo-900 text-white relative overflow-hidden mb-10">
                <div class="relative z-10">
                    <h2 class="text-3xl font-black">سوق كوستي الذكي 🇸🇩</h2>
                    <p class="mt-2 opacity-80 font-bold">أول تجربة تسوق تفاعلية في النيل الأبيض لعام 2026</p>
                </div>
                <div class="absolute -right-10 -bottom-10 text-9xl opacity-10 font-black italic">NEW</div>
            </div>

            <h3 class="text-2xl font-black mb-6 flex items-center gap-2">✨ وصل حديثاً</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6" id="grid-all">
                </div>
        </div>

        <div id="section-vendor" class="section-view">
            <div class="max-w-xl mx-auto glass-panel p-8 shadow-2xl">
                <h2 class="text-2xl font-black mb-8 border-b pb-4">📦 إضافة معروض جديد</h2>
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold mb-2 mr-2">اسم المنتج</label>
                        <input type="text" id="p-name" placeholder="مثلاً: آيفون 15 برو" class="w-full p-4 glass-panel bg-white/50 border-none outline-none ring-1 ring-blue-100">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-2 mr-2">السعر (ج.س)</label>
                        <input type="number" id="p-price" placeholder="حدد سعرك" class="w-full p-4 glass-panel bg-white/50 border-none outline-none ring-1 ring-blue-100">
                    </div>
                    
                    <div class="relative group">
                        <label class="w-full h-44 border-2 border-dashed border-blue-400 rounded-[2.5rem] flex flex-col items-center justify-center cursor-pointer hover:bg-blue-50 transition-all">
                            <div class="text-4xl group-hover:scale-125 transition">📸</div>
                            <span class="font-black text-blue-600 mt-3">اختر صورة من هاتفك</span>
                            <input type="file" id="p-file" accept="image/*" class="hidden" onchange="handleFileStatus()">
                        </label>
                    </div>
                    <p id="file-status" class="text-center text-xs font-bold text-green-600"></p>

                    <button onclick="saveAndPublish()" class="w-full bg-blue-600 text-white py-5 rounded-[2rem] font-black text-xl shadow-2xl shadow-blue-300 hover:bg-blue-700 active:scale-95 transition">نشر الآن في المتجر 🚀</button>
                    <button onclick="showSection('all')" class="w-full text-gray-400 font-bold py-2 text-sm">إلغاء والعودة</button>
                </div>
            </div>
        </div>
    </main>

    <div class="fixed bottom-6 inset-x-0 mx-auto w-[92%] max-w-lg glass-panel p-3 flex justify-around items-center z-[1000] shadow-2xl">
        <button onclick="showSection('all')" class="flex flex-col items-center"><span>🏠</span><span class="text-[9px] font-bold">الرئيسية</span></button>
        <button onclick="showSection('vendor')" class="flex flex-col items-center opacity-40"><span>📦</span><span class="text-[9px] font-bold">بيعي</span></button>
        <button onclick="checkout()" class="w-14 h-14 bg-blue-600 text-white rounded-full flex items-center justify-center text-2xl shadow-xl shadow-blue-300 -mt-10 border-4 border-white">🛒</button>
        <button class="flex flex-col items-center opacity-40"><span>💬</span><span class="text-[9px] font-bold">دردشة</span></button>
        <button class="flex flex-col items-center opacity-40"><span>👤</span><span class="text-[9px] font-bold">حسابي</span></button>
    </div>

    <script>
        let db = []; // قاعدة البيانات المؤقتة للمنتجات
        let cart = [];

        function showSection(id) {
            document.querySelectorAll('.section-view').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(`section-${id}`);
            target.classList.add('active');
            renderUI();
        }

        function handleFileStatus() {
            const file = document.getElementById('p-file').files[0];
            if(file) document.getElementById('file-status').innerText = "✅ جاهز للرفع: " + file.name;
        }

        // الوظيفة الأساسية: حفظ المنتج مع الصورة المرفوعة
        function saveAndPublish() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const fileInput = document.getElementById('p-file');

            if (name && price && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const productData = {
                        id: Date.now(),
                        name: name,
                        price: price,
                        img: e.target.result // هذا يحفظ الصورة المرفوعة كـ DataURL
                    };
                    
                    // إضافته لقاعدة البيانات
                    db.unshift(productData);
                    
                    // إضافة صورة للستوري
                    addToStory(productData.img);
                    
                    alert("تم نشر منتجك بنجاح في كوستي ماركت!");
                    
                    // تفريغ الحقول والعودة للرئيسية
                    document.getElementById('p-name').value = '';
                    document.getElementById('p-price').value = '';
                    document.getElementById('p-file').value = '';
                    document.getElementById('file-status').innerText = '';
                    
                    showSection('all');
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                alert("يرجى إكمال البيانات واختيار صورة المنتج أولاً!");
            }
        }

        function addToStory(img) {
            const storyContainer = document.getElementById('story-container');
            const newStory = `<div class="story-circle animate-bounce"><img src="${img}"></div>`;
            storyContainer.innerHTML += newStory;
        }

        function renderUI() {
            const grid = document.getElementById('grid-all');
            grid.innerHTML = db.length ? '' : '<div class="col-span-full text-center py-20 opacity-30 font-black italic">لا يوجد معروضات حالياً.. ارفع منتجك الأول الآن!</div>';
            
            db.forEach(item => {
                grid.innerHTML += `
                    <div class="bento-item glass-panel p-4 flex flex-col group">
                        <div class="rounded-[2rem] overflow-hidden h-44 mb-3">
                            <img src="${item.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                        </div>
                        <h4 class="font-black text-sm px-1 truncate">${item.name}</h4>
                        <div class="mt-4 flex justify-between items-center px-1">
                            <span class="text-blue-600 font-black text-lg">${parseInt(item.price).toLocaleString()} <small class="text-[8px]">ج.س</small></span>
                            <button onclick="addToCart(${item.id})" class="bg-blue-50 w-9 h-9 rounded-xl flex items-center justify-center hover:bg-blue-600 hover:text-white transition">🛒</button>
                        </div>
                    </div>`;
            });
        }

        function addToCart(id) {
            const product = db.find(p => p.id === id);
            cart.push(product);
            
            // إشعار وهمي لزيادة الحماس
            const notif = document.getElementById('notif');
            document.getElementById('notif-text').innerText = `تمت إضافة ${product.name} للسلة!`;
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 3000);
        }

        function checkout() {
            if(cart.length === 0) return alert("السلة فارغة!");
            let msg = `أريد شراء ${cart.length} منتجات من كوستي ماركت.`;
            window.open(`https://wa.me/249123456789?text=${encodeURIComponent(msg)}`);
        }

        // تشغيل العرض الأولي
        renderUI();
    </script>
</body>
</html>
