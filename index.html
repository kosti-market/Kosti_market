<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Bags | الفخامة اليدوية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;900&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #d4af37; --bg: #080808; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); color: #fff; overflow-x: hidden; scroll-behavior: smooth; }
        .serif { font-family: 'Amiri', serif; }

        /* أنيميشن الانتقال السينمائي */
        .img-reveal { animation: imgReveal 0.8s cubic-bezier(0.19, 1, 0.22, 1); }
        @keyframes imgReveal {
            from { opacity: 0; transform: scale(1.1) translateY(10px); filter: blur(5px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        /* تأثيرات زخرفية عصرية */
        .glass-nav { background: rgba(8, 8, 8, 0.7); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(212, 175, 55, 0.1); }
        .card-glow { transition: 0.5s; border: 1px solid rgba(255,255,255,0.03); }
        .card-glow:hover { border-color: var(--accent); box-shadow: 0 0 30px rgba(212, 175, 55, 0.1); transform: translateY(-8px); }

        /* زر المشاركة */
        .share-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .share-btn:hover { background: #fff; color: #000; }

        .hidden-admin { display: none; }
        #productModal::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-[100] px-8 py-5 flex justify-between items-center glass-nav">
        <div class="serif text-3xl font-black text-[#d4af37] tracking-widest">BEST BAGS</div>
        <div class="flex gap-6 items-center">
            <a href="#gallery" class="text-xs font-bold hover:text-[#d4af37] transition">المعرض</a>
            <a href="https://wa.me/249900623733" class="bg-[#d4af37] text-black px-6 py-2 rounded-full text-[10px] font-black uppercase shadow-lg">اتصال</a>
        </div>
    </nav>

    <section class="h-[80vh] flex flex-col justify-center items-center text-center px-4 relative overflow-hidden">
        <div class="absolute w-[500px] h-[500px] bg-[#d4af37]/5 rounded-full blur-[120px] -top-40 -right-20"></div>
        <h1 class="serif text-6xl md:text-8xl mb-8 reveal-text">نُخبة <span class="text-[#d4af37]">الحقائب</span></h1>
        <p class="max-w-2xl text-gray-500 text-lg font-light leading-relaxed">استكشف مجموعة "Best Bags" الحصرية. تصاميم تجسد الأصالة السودانية بلمسة عالمية.</p>
    </section>

    <section id="gallery" class="py-20 max-w-7xl mx-auto px-6">
        <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12"></div>
    </section>

    <section id="adminZone" class="hidden-admin py-24 bg-[#0a0a0a] border-t border-white/5">
        <div class="max-w-3xl mx-auto p-10 bg-white/5 rounded-[3rem] border border-[#d4af37]/20">
            <div class="flex justify-between items-center mb-10">
                <h2 class="serif text-3xl text-[#d4af37]">إدارة المتجر</h2>
                <button onclick="handleLogout()" class="text-xs text-red-500 border border-red-500/20 px-5 py-2 rounded-full hover:bg-red-500 hover:text-white transition">خروج</button>
            </div>
            <div class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="text" id="pName" placeholder="اسم الحقيبة" class="bg-black/50 p-5 rounded-2xl outline-none focus:ring-1 ring-[#d4af37]">
                    <input type="number" id="pPrice" placeholder="السعر" class="bg-black/50 p-5 rounded-2xl outline-none">
                </div>
                <textarea id="pDesc" placeholder="وصف المنتج..." class="w-full bg-black/50 p-5 rounded-2xl h-40 outline-none"></textarea>
                <input type="file" id="pFiles" multiple class="block w-full text-xs text-gray-500 file:bg-[#d4af37] file:px-6 file:py-3 file:rounded-full file:border-0 cursor-pointer">
                <button onclick="uploadProduct()" id="uploadBtn" class="w-full py-5 bg-[#d4af37] text-black rounded-2xl font-black uppercase tracking-tighter">إضافة المنتج للمعرض</button>
            </div>
        </div>
    </section>

    <footer class="py-20 text-center text-[9px] text-gray-800 tracking-[1em] relative">
        BEST BAGS LUXURY © 2026
        <div onclick="showLogin()" class="absolute bottom-5 right-10 w-2 h-2 bg-white/5 rounded-full cursor-pointer hover:bg-[#d4af37] transition"></div>
    </footer>

    <div id="productModal" class="fixed inset-0 z-[200] hidden bg-black/98 backdrop-blur-3xl overflow-y-auto">
        <div class="max-w-7xl mx-auto min-h-screen flex flex-col items-center py-20 px-6">
            
            <button onclick="closeModal()" class="fixed top-10 right-10 z-[210] flex items-center gap-4 text-white/40 hover:text-[#d4af37] transition uppercase text-[10px] tracking-widest font-bold">
                العودة للمعرض ✕
            </button>

            <div class="w-full flex flex-col lg:flex-row gap-20 items-start">
                <div class="w-full lg:w-3/5 relative">
                    <div class="aspect-square rounded-[3rem] overflow-hidden bg-white/5 shadow-2xl relative group">
                        <img id="mainImg" class="w-full h-full object-cover">
                        <div class="absolute inset-0 flex justify-between items-center px-4 md:px-8 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="prevImg()" class="w-14 h-14 rounded-full share-btn flex items-center justify-center text-xl">⮕</button>
                            <button onclick="nextImg()" class="w-14 h-14 rounded-full share-btn flex items-center justify-center text-xl">⬅</button>
                        </div>
                    </div>
                    <div id="thumbContainer" class="flex gap-4 mt-8 justify-center overflow-x-auto pb-4"></div>
                </div>

                <div class="w-full lg:w-2/5 text-right">
                    <h2 id="pTitle" class="serif text-5xl mb-6 text-[#d4af37] leading-tight"></h2>
                    <p id="pPriceDisplay" class="text-3xl font-light mb-8 text-gray-400"></p>
                    <div class="bg-white/5 p-8 rounded-[2.5rem] border border-white/5 mb-10 leading-relaxed text-lg text-gray-300 italic" id="pDescription"></div>
                    
                    <div class="flex flex-col gap-4">
                        <div class="flex gap-4">
                            <button id="waOrder" class="flex-[3] py-6 bg-[#d4af37] text-black rounded-3xl font-black text-sm uppercase tracking-widest hover:brightness-110 shadow-2xl shadow-gold/20">طلب عبر الواتساب</button>
                            <button id="shareBtn" class="flex-1 share-btn rounded-3xl flex items-center justify-center" title="مشاركة">
                                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>
                            </button>
                        </div>
                        <button id="saveImg" class="w-full py-4 text-[10px] text-gray-600 border border-white/5 rounded-2xl hover:border-white/20 transition uppercase tracking-[0.3em]">حفظ الصورة في الجهاز</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="loginModal" class="fixed inset-0 z-[300] hidden bg-black/95 flex items-center justify-center p-6">
        <div class="w-full max-w-sm">
            <h3 class="serif text-2xl text-center mb-10 text-[#d4af37]">إدارة Best Bags</h3>
            <input type="email" id="admEmail" placeholder="البريد" class="w-full bg-white/5 p-5 rounded-2xl mb-4 border border-white/10 outline-none focus:border-[#d4af37]">
            <input type="password" id="admPass" placeholder="كلمة المرور" class="w-full bg-white/5 p-5 rounded-2xl mb-10 border border-white/10 outline-none focus:border-[#d4af37]">
            <button onclick="handleLogin()" class="w-full py-5 bg-[#d4af37] text-black rounded-full font-black">فتح النظام</button>
            <button onclick="hideLogin()" class="w-full mt-6 text-gray-600 text-xs">إلغاء</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://bxbglomvulnzehruubdh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4Ymdsb212dWxuemVocnV1YmRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mzg5MDYsImV4cCI6MjA5MjUxNDkwNn0.rqIZHvP47QugH9vG0LW8OkkmAVYEzhOwv-VUKJuEqOY';
        const _client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let dataStore = [];
        let sliderIdx = 0;
        let sliderImgs = [];

        async function handleLogin() {
            const { error } = await _client.auth.signInWithPassword({
                email: document.getElementById('admEmail').value,
                password: document.getElementById('admPass').value
            });
            if (error) alert("خطأ في الدخول"); else location.reload();
        }

        async function handleLogout() { await _client.auth.signOut(); location.reload(); }
        function showLogin() { document.getElementById('loginModal').style.display = 'flex'; }
        function hideLogin() { document.getElementById('loginModal').style.display = 'none'; }

        async function uploadProduct() {
            const btn = document.getElementById('uploadBtn');
            const files = document.getElementById('pFiles').files;
            btn.innerText = "جاري الحفظ...";
            try {
                let urls = [];
                for (let f of files) {
                    const n = `${Date.now()}_${f.name}`;
                    await _client.storage.from('product-images').upload(n, f);
                    const { data } = _client.storage.from('product-images').getPublicUrl(n);
                    urls.push(data.publicUrl);
                }
                await _client.from('products').insert([{
                    name: document.getElementById('pName').value,
                    price: document.getElementById('pPrice').value,
                    description: document.getElementById('pDesc').value,
                    images: urls
                }]);
                location.reload();
            } catch (e) { alert("حدث خطأ"); }
        }

        function openModal(id) {
            const p = dataStore.find(x => x.id == id);
            sliderImgs = p.images;
            sliderIdx = 0;
            updateUI();

            document.getElementById('pTitle').innerText = p.name;
            document.getElementById('pPriceDisplay').innerText = `${p.price} SDG`;
            document.getElementById('pDescription').innerText = p.description || "جلد طبيعي فاخر مُصنع يدوياً.";
            
            document.getElementById('waOrder').onclick = () => {
                const msg = encodeURIComponent(`مرحباً Best Bags، أود الاستفسار عن:\n\nالمنتج: ${p.name}\nالسعر: ${p.price} SDG\n\nشكراً.`);
                window.open(`https://wa.me/249900623733?text=${msg}`);
            };

            // ميزة المشاركة
            document.getElementById('shareBtn').onclick = () => {
                if (navigator.share) {
                    navigator.share({
                        title: p.name,
                        text: `شاهد هذه الحقيبة الرائعة من Best Bags: ${p.name}`,
                        url: window.location.href
                    });
                } else {
                    alert("الرابط منسوخ: " + window.location.href);
                }
            };

            // حفظ الصورة
            document.getElementById('saveImg').onclick = async () => {
                const res = await fetch(sliderImgs[sliderIdx]);
                const b = await res.blob();
                const l = document.createElement('a'); l.href = URL.createObjectURL(b); l.download = `${p.name}.jpg`; l.click();
            };

            const thumbs = document.getElementById('thumbContainer');
            thumbs.innerHTML = p.images.map((img, i) => `
                <img src="${img}" onclick="setSlider(${i})" class="w-16 h-16 object-cover rounded-xl cursor-pointer border-2 ${i==0?'border-[#d4af37]':'border-transparent'} hover:border-[#d4af37]">
            `).join('');

            document.getElementById('productModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function setSlider(i) { sliderIdx = i; updateUI(); }
        function nextImg() { sliderIdx = (sliderIdx + 1) % sliderImgs.length; updateUI(); }
        function prevImg() { sliderIdx = (sliderIdx - 1 + sliderImgs.length) % sliderImgs.length; updateUI(); }

        function updateUI() {
            const img = document.getElementById('mainImg');
            img.classList.remove('img-reveal');
            void img.offsetWidth;
            img.src = sliderImgs[sliderIdx];
            img.classList.add('img-reveal');
        }

        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        async function init() {
            const { data } = await _client.from('products').select('*').order('created_at', {ascending: false});
            dataStore = data || [];
            const grid = document.getElementById('productsGrid');
            const sess = await _client.auth.getSession();
            const isAdmin = sess.data.session;

            grid.innerHTML = dataStore.map(p => `
                <div class="card-glow rounded-[3rem] p-4 bg-[#111] group">
                    <div class="aspect-[4/5] rounded-[2.5rem] overflow-hidden cursor-pointer relative" onclick="openModal('${p.id}')">
                        <img src="${p.images[0]}" class="w-full h-full object-cover transition duration-1000 group-hover:scale-110">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                            <span class="text-[10px] uppercase tracking-widest border border-white/20 px-8 py-3 rounded-full">التفاصيل</span>
                        </div>
                    </div>
                    <div class="pt-6 px-4 flex justify-between items-center">
                        <div>
                            <h3 class="serif text-xl mb-1">${p.name}</h3>
                            <p class="text-[#d4af37] font-bold text-sm">${p.price} SDG</p>
                        </div>
                        ${isAdmin ? `<button onclick="deleteP('${p.id}')" class="text-red-800 text-[9px] underline uppercase">حذف</button>` : ''}
                    </div>
                </div>
            `).join('');

            if(isAdmin) document.getElementById('adminZone').classList.remove('hidden-admin');
        }

        async function deleteP(id) { if(confirm("حذف؟")) { await _client.from('products').delete().eq('id', id); location.reload(); } }

        init();
    </script>
</body>
</html>
