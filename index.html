<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Best Bags | فخامة لكل الأجيال</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Reem+Kufi:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main-pink: #ff4d8d; --soft-pink: #fff0f5; --text-dark: #2d2d2d; }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #fff; 
            color: var(--text-dark); 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .font-title { font-family: 'Reem Kufi', sans-serif; }

        /* شريط التنقل للهاتف - ثابت وسلس */
        .nav-container {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            padding: 8px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .nav-container::-webkit-scrollbar { display: none; }

        .nav-tab {
            white-space: nowrap;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            color: #888;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: #f8f8f8;
        }
        .nav-tab.active {
            background: var(--main-pink);
            color: white;
            box-shadow: 0 8px 15px rgba(255, 77, 141, 0.25);
            transform: scale(1.05);
        }

        /* تأثيرات الظهور للمنتجات */
        .product-fade {
            animation: fadeIn 0.6s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* تصميم البطاقة للهاتف */
        .bag-card {
            background: #fff;
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            border: 1px solid #f0f0f0;
        }
        .bag-card:active { transform: scale(0.97); }

        /* نافذة العرض المنبثقة كاملة الشاشة للهاتف */
        #productModal {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(100%);
            opacity: 0;
        }
        #productModal.active {
            transform: translateY(0);
            opacity: 1;
        }

        .swipe-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            height: 350px;
        }
        .swipe-item {
            min-width: 100%;
            scroll-snap-align: center;
        }

        /* تحسينات الإدخال للهاتف */
        input, select, textarea {
            font-size: 16px !important; /* يمنع الزووم التلقائي في الآيفون */
        }

        .hero-gradient {
            background: linear-gradient(180deg, #fff0f5 0%, #ffffff 100%);
        }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full z-[100] bg-white/90 backdrop-blur-md border-b border-pink-50">
        <div class="px-4 py-3">
            <div class="flex justify-between items-center mb-3">
                <div class="logo-3d font-title text-2xl text-[#ff4d8d] font-black" onclick="location.reload()">Best Bags</div>
                <a href="https://wa.me/249900623733" class="bg-[#ff4d8d] text-white p-2 rounded-full shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.437 2.503 1.189 3.466L6.382 18.24l2.903-1.047c.905.61 1.996.964 3.171.964h.001c3.181 0 5.766-2.587 5.767-5.767s-3.011-6.218-6.193-6.218z"/></svg>
                </a>
            </div>
            <nav class="nav-container">
                <div class="nav-tab active" onclick="filterCategory('الكل', this)">✨ الكل</div>
                <div class="nav-tab" onclick="filterCategory('نسائي', this)">👜 نسائي</div>
                <div class="nav-tab" onclick="filterCategory('رجالي', this)">💼 رجالي</div>
                <div class="nav-tab" onclick="filterCategory('اطفالي', this)">🎈 أطفالي</div>
            </nav>
        </div>
    </header>

    <section class="hero-gradient pt-40 pb-10 px-6 text-center">
        <h1 class="font-title text-4xl text-gray-800 mb-4 leading-tight">فخامة تناسب <span class="text-[#ff4d8d]">تطلعاتكم</span></h1>
        <p class="text-sm text-gray-500 max-w-xs mx-auto leading-relaxed">
            مجموعات حصرية مختارة بعناية لكل العائلة، جودة عالمية بين يديك.
        </p>
    </section>

    <main id="gallery" class="px-4 pb-24 grid grid-cols-1 sm:grid-cols-2 gap-6"></main>

    <section id="adminZone" class="hidden p-6 bg-gray-50 border-t-4 border-[#ff4d8d]">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-title text-2xl">إضافة منتج</h2>
                <button onclick="handleLogout()" class="text-xs text-red-400 font-bold uppercase tracking-tighter">خروج 🔐</button>
            </div>
            <div class="space-y-4">
                <input type="text" id="pName" placeholder="اسم المنتج" class="w-full p-4 rounded-xl border-0 shadow-sm outline-none">
                <input type="number" id="pPrice" placeholder="السعر" class="w-full p-4 rounded-xl border-0 shadow-sm outline-none">
                <select id="pCategory" class="w-full p-4 rounded-xl border-0 shadow-sm outline-none font-bold">
                    <option value="نسائي">نسائي</option>
                    <option value="رجالي">رجالي</option>
                    <option value="اطفالي">أطفالي</option>
                </select>
                <textarea id="pDesc" placeholder="الوصف" class="w-full p-4 rounded-xl border-0 shadow-sm outline-none h-24"></textarea>
                <input type="file" id="pFiles" multiple class="text-xs">
                <button onclick="uploadProduct()" id="uploadBtn" class="w-full bg-[#ff4d8d] text-white py-4 rounded-xl font-bold shadow-lg">نشر الآن</button>
            </div>
        </div>
    </section>

    <div id="productModal" class="fixed inset-0 z-[200] bg-white hidden flex-col">
        <div class="p-4 flex items-center justify-between border-b">
            <button onclick="closeModal()" class="text-gray-400 p-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
            <span class="font-title font-bold text-gray-700">تفاصيل المنتج</span>
            <div class="w-10"></div>
        </div>
        
        <div class="flex-1 overflow-y-auto">
            <div class="swipe-container" id="swipeGallery"></div>
            <div class="p-6 space-y-6">
                <div class="flex justify-between items-start">
                    <h2 id="modalTitle" class="font-title text-3xl text-gray-800"></h2>
                    <span id="modalPrice" class="text-[#ff4d8d] font-black text-2xl"></span>
                </div>
                <p id="modalDesc" class="text-gray-500 leading-relaxed text-lg"></p>
                
                <div class="grid grid-cols-1 gap-3 pt-4">
                    <button id="orderWA" class="w-full bg-[#ff4d8d] text-white py-5 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition">طلب عبر واتساب 💬</button>
                    <div class="flex gap-3">
                        <button id="shareBtn" class="flex-1 bg-gray-50 text-gray-600 py-4 rounded-2xl font-bold text-sm">مشاركة 🔗</button>
                        <button id="saveBtn" class="flex-1 bg-gray-50 text-[#ff4d8d] py-4 rounded-2xl font-bold text-sm">حفظ 📥</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-10 text-center text-gray-300 text-[10px] tracking-widest relative">
        BEST BAGS LUXURY © 2026
        <div onclick="askAdmin()" class="absolute bottom-0 left-0 w-12 h-12"></div>
    </footer>

    <script>
        const SUPABASE_URL = 'https://bxbglomvulnzehruubdh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4Ymdsb212dWxuemVocnV1YmRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mzg5MDYsImV4cCI6MjA5MjUxNDkwNn0.rqIZHvP47QugH9vG0LW8OkkmAVYEzhOwv-VUKJuEqOY';
        const _client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allProducts = [];
        let isAdmin = false;

        async function init() {
            const { data } = await _client.from('products').select('*').order('created_at', {ascending: false});
            allProducts = data || [];
            const sess = await _client.auth.getSession();
            isAdmin = !!sess.data.session;
            if(isAdmin) document.getElementById('adminZone').classList.remove('hidden');
            renderGallery(allProducts);
        }

        function renderGallery(products) {
            const grid = document.getElementById('gallery');
            grid.innerHTML = products.map((p, index) => `
                <div class="bag-card product-fade" style="animation-delay: ${index * 0.1}s" onclick="openModal('${p.id}')">
                    <div class="relative h-[280px]">
                        <img src="${p.images[0]}" class="w-full h-full object-cover" loading="lazy">
                        <div class="absolute top-3 right-3 bg-white/90 px-3 py-1 rounded-full text-[10px] font-bold text-[#ff4d8d] shadow-sm">${p.category}</div>
                    </div>
                    <div class="p-4">
                        <h3 class="font-title text-xl text-gray-800 mb-1">${p.name}</h3>
                        <div class="text-[#ff4d8d] font-black">${p.price} SDG</div>
                    </div>
                </div>
            `).join('');
        }

        function filterCategory(cat, el) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            
            // اهتزاز خفيف للهاتف عند التنقل
            if(window.navigator.vibrate) window.navigator.vibrate(10);

            const filtered = cat === 'الكل' ? allProducts : allProducts.filter(p => p.category === cat);
            
            const grid = document.getElementById('gallery');
            grid.style.opacity = '0';
            setTimeout(() => {
                renderGallery(filtered);
                grid.style.opacity = '1';
            }, 200);
        }

        function openModal(id) {
            const p = allProducts.find(x => x.id == id);
            const modal = document.getElementById('productModal');
            
            document.getElementById('swipeGallery').innerHTML = p.images.map(img => `
                <div class="swipe-item"><img src="${img}" class="w-full h-full object-cover"></div>
            `).join('');
            
            document.getElementById('modalTitle').innerText = p.name;
            document.getElementById('modalPrice').innerText = `${p.price} SDG`;
            document.getElementById('modalDesc').innerText = p.description || "لا يوجد وصف حالياً.";

            document.getElementById('orderWA').onclick = () => {
                const msg = `مرحباً Best Bags ✨\nهل المنتج متوفر؟\n\nالاسم: ${p.name}\nالقسم: ${p.category}\nالسعر: ${p.price}\n\n${window.location.href}`;
                window.open(`https://wa.me/249900623733?text=${encodeURIComponent(msg)}`);
            };

            // حفظ الصورة للهاتف
            document.getElementById('saveBtn').onclick = async () => {
                const index = Math.round(document.getElementById('swipeGallery').scrollLeft / window.innerWidth);
                const response = await fetch(p.images[index]);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `BestBags_${Date.now()}.jpg`;
                a.click();
            };

            document.getElementById('shareBtn').onclick = () => {
                navigator.share({ title: p.name, url: window.location.href });
            };

            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('productModal');
            modal.classList.remove('active');
            setTimeout(() => {
                modal.style.display = 'none';
                document.body.style.overflow = 'auto';
            }, 400);
        }

        // تسجيل الدخول بطريقة بسيطة للمدير
        async function askAdmin() {
            const pass = prompt("كلمة مرور الإدارة:");
            if(pass) {
                const { error } = await _client.auth.signInWithPassword({
                    email: "admin@bestbags.com", // بريدك المسجل
                    password: pass
                });
                if(!error) location.reload();
            }
        }

        async function handleLogout() { await _client.auth.signOut(); location.reload(); }

        init();
    </script>
</body>
</html>
