<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSTI MARKET | منصة التجار الاحترافية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; transition: all 0.5s ease; }
        .tab-active { border-bottom: 4px solid #1d4ed8; color: #1d4ed8; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); }
        .sidebar-item:hover { background: #eff6ff; color: #1d4ed8; }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-800">KOSTI <span class="text-blue-500">PRO</span></h1>
            <div class="flex gap-2">
                <button onclick="showPage('user')" class="px-4 py-2 rounded-lg font-bold hover:bg-gray-100">🛒 تسوق</button>
                <button onclick="showPage('vendor')" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold shadow-lg">👨‍💼 لوحة التاجر</button>
            </div>
        </div>
    </nav>

    <section id="user-page" class="page-content animate__animated animate__fadeIn">
        <div class="bg-blue-900 text-white py-10 px-4 text-center">
            <h2 class="text-3xl font-bold mb-2">مرحباً بك في كوستي ماركت</h2>
            <p class="opacity-75">تصفح آلاف المنتجات من تجار كوستي الموثوقين</p>
        </div>

        <div class="container mx-auto px-4 py-6 flex gap-4 overflow-x-auto scrollbar-hide">
            <button onclick="filterBy('all')" class="bg-white px-6 py-2 rounded-full shadow-sm font-bold min-w-fit">الكل</button>
            <button onclick="filterBy('phones')" class="bg-white px-6 py-2 rounded-full shadow-sm font-bold min-w-fit">📱 هواتف</button>
            <button onclick="filterBy('clothes')" class="bg-white px-6 py-2 rounded-full shadow-sm font-bold min-w-fit">👕 ملابس</button>
            <button onclick="filterBy('cars')" class="bg-white px-6 py-2 rounded-full shadow-sm font-bold min-w-fit">🚗 سيارات</button>
        </div>

        <div class="container mx-auto px-4 grid grid-cols-2 md:grid-cols-4 gap-6 pb-24" id="shop-grid">
            </div>
    </section>

    <section id="vendor-page" class="hidden page-content min-h-screen bg-gray-100">
        <div class="container mx-auto px-4 py-8">
            <div class="flex flex-col md:flex-row gap-8">
                
                <aside class="w-full md:w-1/4 space-y-6">
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-blue-100">
                        <div class="text-center">
                            <div class="w-20 h-20 bg-blue-100 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl">👤</div>
                            <h3 class="font-bold text-lg">متجر التاجر "أحمد"</h3>
                            <p class="text-xs text-gray-400">عضو منذ 2026</p>
                        </div>
                        <hr class="my-4">
                        <div class="space-y-4 text-sm">
                            <div class="flex justify-between"><span>إجمالي المبيعات:</span> <span class="font-bold text-green-600" id="stat-sales">0 ج.س</span></div>
                            <div class="flex justify-between"><span>عمولة الموقع (10%):</span> <span class="font-bold text-red-500" id="stat-comm">0 ج.س</span></div>
                            <div class="flex justify-between text-blue-700 font-black border-t pt-2 text-md"><span>صافي أرباحك:</span> <span id="stat-net">0 ج.س</span></div>
                        </div>
                    </div>
                </aside>

                <main class="w-full md:w-3/4">
                    <div class="bg-white rounded-3xl shadow-sm p-6 mb-8">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-xl font-bold">إدارة منتجاتك</h2>
                            <button onclick="toggleAddForm()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold shadow-md">+ إضافة منتج جديد</button>
                        </div>

                        <div id="add-form" class="hidden bg-gray-50 p-6 rounded-2xl mb-8 border-2 border-dashed border-blue-200 animate__animated animate__fadeInDown">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <input type="text" id="v-title" placeholder="اسم المنتج" class="p-3 rounded-lg border-none ring-1 ring-gray-200">
                                <input type="number" id="v-price" placeholder="سعر البيع لك (ج.س)" class="p-3 rounded-lg border-none ring-1 ring-gray-200">
                                <select id="v-cat" class="p-3 rounded-lg border-none ring-1 ring-gray-100 font-bold">
                                    <option value="phones">هواتف</option>
                                    <option value="clothes">ملابس</option>
                                    <option value="cars">سيارات</option>
                                </select>
                                <input type="text" id="v-img" placeholder="رابط الصورة" class="p-3 rounded-lg border-none ring-1 ring-gray-200">
                            </div>
                            <button onclick="saveProduct()" class="w-full mt-4 bg-green-600 text-white py-3 rounded-lg font-bold">حفظ ونشر الآن</button>
                        </div>

                        <div class="overflow-x-auto">
                            <table class="w-full text-right border-collapse">
                                <thead>
                                    <tr class="text-gray-400 text-sm border-b">
                                        <th class="pb-3 pr-2">المنتج</th>
                                        <th class="pb-3 text-center">السعر للجمهور</th>
                                        <th class="pb-3 text-center">ربحك</th>
                                        <th class="pb-3 text-left pl-2">الإجراءات</th>
                                    </tr>
                                </thead>
                                <tbody id="vendor-table-body">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </section>

    <div id="shop-bar" class="fixed bottom-0 inset-x-0 bg-white/90 backdrop-blur border-t p-4 flex justify-between items-center px-8 shadow-2xl">
        <div><p class="text-xs text-gray-400 uppercase font-bold">السعر الإجمالي</p><p id="total-price" class="text-xl font-black text-blue-900">0 ج.س</p></div>
        <button onclick="sendWA()" class="bg-green-500 text-white px-10 py-3 rounded-2xl font-black">اطلب الآن (واتساب)</button>
    </div>

    <script>
        // داتابيس مركزية
        let products = [
            { id: 1, title: "آيفون 13 عادي", price: 500000, cat: "phones", img: "https://m.media-amazon.com/images/I/71ZOtNdaZCL._AC_SL1500_.jpg", owner: "أحمد" },
            { id: 2, title: "تيشيرت بولو", price: 15000, cat: "clothes", img: "https://m.media-amazon.com/images/I/81Pj6pYJcFL._AC_UX679_.jpg", owner: "أحمد" }
        ];

        let cart = [];
        const commission = 0.10;

        function showPage(page) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
            document.getElementById(`${page}-page`).classList.remove('hidden');
            document.getElementById('shop-bar').style.display = (page === 'user') ? 'flex' : 'none';
            if(page === 'vendor') updateVendorUI();
            else updateShopUI();
        }

        // --- وظائف المتجر ---
        function updateShopUI(list = products) {
            const grid = document.getElementById('shop-grid');
            grid.innerHTML = '';
            list.forEach(p => {
                const finalP = Math.round(p.price * (1 + commission));
                grid.innerHTML += `
                    <div class="bg-white p-3 rounded-3xl shadow-sm hover:shadow-lg transition-all border border-gray-100">
                        <img src="${p.img}" class="w-full h-40 object-cover rounded-2xl mb-3">
                        <h4 class="font-bold text-sm truncate">${p.title}</h4>
                        <div class="flex justify-between items-center mt-3">
                            <span class="text-blue-700 font-black">${finalP.toLocaleString()} ج.س</span>
                            <button onclick="addToCart(${p.id})" class="bg-blue-50 text-blue-600 p-2 rounded-lg font-black">+</button>
                        </div>
                    </div>`;
            });
        }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            cart.push(p);
            let total = 0;
            cart.forEach(x => total += Math.round(x.price * (1+commission)));
            document.getElementById('total-price').innerText = total.toLocaleString() + " ج.س";
        }

        function sendWA() {
            if(cart.length === 0) return alert("سلتك فارغة!");
            let msg = "🛒 *طلب جديد من كوستي برو*\n\n";
            let total = 0;
            cart.forEach(p => {
                const finalP = Math.round(p.price * (1+commission));
                msg += `- ${p.title}: (${finalP.toLocaleString()} ج.س)\n`;
                total += finalP;
            });
            msg += `\n💰 *الإجمالي: ${total.toLocaleString()} ج.س*`;
            window.open(`https://wa.me/249123456789?text=${encodeURIComponent(msg)}`);
        }

        // --- وظائف التاجر ---
        function toggleAddForm() { document.getElementById('add-form').classList.toggle('hidden'); }

        function updateVendorUI() {
            const myProducts = products.filter(p => p.owner === "أحمد");
            const tbody = document.getElementById('vendor-table-body');
            tbody.innerHTML = '';
            
            let totalSales = 0;
            myProducts.forEach(p => {
                const consumerPrice = Math.round(p.price * (1 + commission));
                totalSales += consumerPrice;
                tbody.innerHTML += `
                    <tr class="border-b text-sm">
                        <td class="py-4 flex items-center gap-2">
                            <img src="${p.img}" class="w-8 h-8 rounded-lg object-cover">
                            <span class="font-bold">${p.title}</span>
                        </td>
                        <td class="text-center font-bold text-blue-600">${consumerPrice.toLocaleString()}</td>
                        <td class="text-center font-bold text-green-600">${p.price.toLocaleString()}</td>
                        <td class="text-left"><button onclick="deleteProduct(${p.id})" class="text-red-400 hover:text-red-600">حذف</button></td>
                    </tr>`;
            });

            // تحديث البطاقة الجانبية
            document.getElementById('stat-sales').innerText = totalSales.toLocaleString() + " ج.س";
            document.getElementById('stat-comm').innerText = Math.round(totalSales * 0.1).toLocaleString() + " ج.س";
            document.getElementById('stat-net').innerText = (totalSales - Math.round(totalSales * 0.1)).toLocaleString() + " ج.س";
        }

        function saveProduct() {
            const title = document.getElementById('v-title').value;
            const price = parseFloat(document.getElementById('v-price').value);
            const cat = document.getElementById('v-cat').value;
            const img = document.getElementById('v-img').value || "https://via.placeholder.com/150";

            if(title && price) {
                products.push({ id: Date.now(), title, price, cat, img, owner: "أحمد" });
                updateVendorUI();
                toggleAddForm();
                alert("تم إدراج المنتج بنجاح!");
            }
        }

        function deleteProduct(id) {
            products = products.filter(p => p.id !== id);
            updateVendorUI();
        }

        function filterBy(cat) {
            if(cat === 'all') updateShopUI();
            else updateShopUI(products.filter(p => p.cat === cat));
        }

        // تشغيل أولي
        updateShopUI();
    </script>
</body>
</html>
