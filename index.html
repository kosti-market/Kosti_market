<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Bags | عالم الأناقة النسائية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --main-pink: #ff4d8d; --soft-pink: #fff0f5; --gold: #d4af37; --text-dark: #2d2d2d; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--soft-pink); color: var(--text-dark); overflow-x: hidden; }
        .font-title { font-family: 'Reem Kufi', sans-serif; }

        /* تصميم الاسم 3D */
        .logo-3d {
            font-size: 3rem; font-weight: 900; color: var(--main-pink);
            text-shadow: 1px 1px 0px #ffb6c1, 2px 2px 0px #ffb6c1, 3px 3px 0px #ffb6c1, 4px 4px 15px rgba(0,0,0,0.1);
            transition: 0.5s; cursor: pointer; display: inline-block;
        }
        .logo-3d:hover { transform: scale(1.1) rotate(-2deg); text-shadow: 1px 1px 0px var(--gold), 5px 5px 20px rgba(255, 77, 141, 0.3); }

        /* بطاقة المنتج */
        .bag-card {
            background: #fff; border-radius: 2.5rem; padding: 1rem;
            box-shadow: 20px 20px 60px #d9cad0, -20px -20px 60px #ffffff;
            transition: 0.4s; border: 2px solid transparent;
        }
        .bag-card:hover { transform: scale(1.03); border-color: var(--main-pink); }

        /* السلايدر بالسحب */
        .swipe-container {
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
            scrollbar-width: none; cursor: grab; border-radius: 2rem;
        }
        .swipe-container::-webkit-scrollbar { display: none; }
        .swipe-item { min-width: 100%; scroll-snap-align: center; height: 400px; }
        .swipe-item img { width: 100%; height: 100%; object-fit: cover; }

        /* الأزرار */
        .btn-primary {
            background: linear-gradient(135deg, var(--main-pink), #ff85a1);
            color: white; font-weight: 900; border-radius: 1.2rem;
            transition: 0.3s; box-shadow: 0 10px 20px rgba(255, 77, 141, 0.2);
        }
        .btn-secondary {
            border: 2px solid #ffdae9; color: var(--main-pink);
            font-weight: 700; border-radius: 1.2rem; transition: 0.3s;
        }
        .btn-secondary:hover { background: #fff0f5; }

        .back-btn {
            position: fixed; top: 20px; right: 20px; z-index: 250;
            background: var(--main-pink); color: white; padding: 12px 24px;
            border-radius: 1rem; font-weight: bold; box-shadow: 0 10px 20px rgba(255, 77, 141, 0.3);
        }

        .login-input {
            width: 100%; background: #f8f8f8; border: 2px solid #eee;
            padding: 1rem; border-radius: 1rem; margin-bottom: 1rem;
            outline: none; transition: 0.3s;
        }
        .hidden-admin { display: none; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-[100] px-6 py-4 flex justify-between items-center bg-white/80 backdrop-blur-md border-b border-pink-100">
        <div class="logo-3d font-title">Best Bags</div>
        <a href="https://wa.me/249900623733" class="btn-primary px-6 py-2 text-sm">تواصلِ معنا</a>
    </nav>

    <section class="h-[60vh] flex flex-col justify-center items-center text-center px-6 pt-24 bg-gradient-to-b from-white to-pink-50">
        <h1 class="font-title text-5xl md:text-7xl text-gray-800 mb-4">أناقتكِ تبدأ من <span class="text-[#ff4d8d]">حقيبتكِ</span></h1>
        <p class="text-gray-500 text-lg max-w-xl">مجموعة مختارة من الحقائب الجلدية الفاخرة التي تليق بجمالكِ.</p>
    </section>

    <section id="gallery" class="py-16 max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></section>

    <section id="adminZone" class="hidden-admin py-20 bg-white border-t-4 border-[#ff4d8d]">
        <div class="max-w-2xl mx-auto p-8 shadow-2xl rounded-[2rem]">
            <div class="flex justify-between items-center mb-8">
                <h2 class="font-title text-3xl text-gray-800">إدارة المتجر</h2>
                <button onclick="handleLogout()" class="text-red-500 font-bold border-b-2 border-red-200">خروج</button>
            </div>
            <input type="text" id="pName" placeholder="اسم الحقيبة" class="login-input">
            <input type="number" id="pPrice" placeholder="السعر" class="login-input">
            <textarea id="pDesc" placeholder="الوصف..." class="login-input h-32"></textarea>
            <input type="file" id="pFiles" multiple class="mb-6 block w-full text-sm">
            <button onclick="uploadProduct()" id="uploadBtn" class="btn-primary w-full py-5 text-xl">نشر المنتج</button>
        </div>
    </section>

    <footer class="py-12 text-center text-gray-400 text-sm tracking-widest relative">
        BEST BAGS LUXURY COLLECTION © 2026
        <div onclick="showLogin()" class="absolute bottom-5 left-1/2 -translate-x-1/2 w-4 h-4 cursor-pointer opacity-0"></div>
    </footer>

    <div id="productModal" class="fixed inset-0 z-[200] hidden bg-white overflow-y-auto">
        <button onclick="closeModal()" class="back-btn">رجوع للمتجر ➔</button>
        <div class="max-w-6xl mx-auto min-h-screen flex flex-col lg:flex-row items-center gap-12 p-6 pt-24 lg:pt-0">
            <div class="w-full lg:w-1/2">
                <div class="swipe-container shadow-2xl border-4 border-white" id="swipeGallery"></div>
                <div class="flex justify-center gap-2 mt-4" id="dotContainer"></div>
                <p class="text-center text-pink-300 text-xs mt-4 animate-pulse">اسحبي الصورة لمشاهدة المزيد ↔</p>
            </div>
            <div class="w-full lg:w-1/2 space-y-6 text-right">
                <h2 id="modalTitle" class="font-title text-5xl text-gray-800"></h2>
                <div class="inline-block bg-pink-100 text-[#ff4d8d] px-6 py-2 rounded-full font-black text-2xl" id="modalPrice"></div>
                <div class="h-1 w-20 bg-gold rounded-full"></div>
                <p id="modalDesc" class="text-gray-600 text-xl leading-relaxed bg-pink-50/50 p-6 rounded-3xl"></p>
                <div class="grid grid-cols-1 gap-4 pt-6">
                    <button id="orderWA" class="btn-primary py-6 text-lg">اطلبِ الآن عبر واتساب</button>
                    <div class="flex gap-4">
                        <button id="shareBtn" class="flex-1 py-4 btn-secondary">مشاركة</button>
                        <button id="saveBtn" class="flex-1 py-4 btn-secondary">حفظ الصورة</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="loginModal" class="fixed inset-0 z-[300] hidden bg-[#ff4d8d] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl text-center">
            <h3 class="font-title text-3xl mb-8">دخول الإدارة</h3>
            <input type="email" id="admEmail" class="login-input text-center" placeholder="البريد">
            <input type="password" id="admPass" class="login-input text-center" placeholder="كلمة المرور">
            <button onclick="handleLogin()" class="btn-primary w-full py-4 mt-4">دخول</button>
            <button onclick="hideLogin()" class="w-full mt-6 text-gray-400 text-sm underline">إغلاق</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://bxbglomvulnzehruubdh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4Ymdsb212dWxuemVocnV1YmRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mzg5MDYsImV4cCI6MjA5MjUxNDkwNn0.rqIZHvP47QugH9vG0LW8OkkmAVYEzhOwv-VUKJuEqOY';
        const _client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let productsStore = [];
        let currentImgs = [];

        async function handleLogin() {
            const { error } = await _client.auth.signInWithPassword({
                email: document.getElementById('admEmail').value,
                password: document.getElementById('admPass').value
            });
            if (error) alert("بيانات خاطئة"); else location.reload();
        }

        async function handleLogout() { await _client.auth.signOut(); location.reload(); }
        function showLogin() { document.getElementById('loginModal').style.display = 'flex'; }
        function hideLogin() { document.getElementById('loginModal').style.display = 'none'; }

        function openModal(id) {
            const p = productsStore.find(x => x.id == id);
            currentImgs = p.images;
            const gallery = document.getElementById('swipeGallery');
            gallery.innerHTML = p.images.map(img => `<div class="swipe-item"><img src="${img}"></div>`).join('');
            
            document.getElementById('modalTitle').innerText = p.name;
            document.getElementById('modalPrice').innerText = `${p.price} SDG`;
            document.getElementById('modalDesc').innerText = p.description || "قطعة فنية تضفي لمسة سحرية على إطلالتكِ.";
            
            // الواتساب مع التفاصيل كاملة
            document.getElementById('orderWA').onclick = () => {
                const msg = `مرحباً Best Bags ✨\n\nأود طلب المنتج التالي:\n👜 الاسم: ${p.name}\n💰 السعر: ${p.price} SDG\n📝 الوصف: ${p.description || 'لا يوجد وصف'}`;
                window.open(`https://wa.me/249900623733?text=${encodeURIComponent(msg)}`);
            };

            // ميزة المشاركة
            document.getElementById('shareBtn').onclick = () => {
                if (navigator.share) {
                    navigator.share({ title: p.name, text: `شوفي هذي الحقيبة من Best Bags: ${p.name}`, url: window.location.href });
                }
            };

            // حفظ الصورة الحالية في السلايدر
            document.getElementById('saveBtn').onclick = async () => {
                const index = Math.round(gallery.scrollLeft / gallery.clientWidth);
                const res = await fetch(currentImgs[index]);
                const b = await res.blob();
                const l = document.createElement('a'); l.href = URL.createObjectURL(b); l.download = `${p.name}.jpg`; l.click();
            };

            document.getElementById('productModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() { document.getElementById('productModal').style.display = 'none'; document.body.style.overflow = 'auto'; }

        async function uploadProduct() {
            const btn = document.getElementById('uploadBtn');
            btn.innerText = "جاري النشر...";
            const files = document.getElementById('pFiles').files;
            try {
                let urls = [];
                for (let f of files) {
                    const n = `${Date.now()}_${f.name}`;
                    await _client.storage.from('product-images').upload(n, f);
                    const { data } = _client.storage.from('product-images').getPublicUrl(n);
                    urls.push(data.publicUrl);
                }
                await _client.from('products').insert([{
                    name: document.getElementById('pName').value,
                    price: document.getElementById('pPrice').value,
                    description: document.getElementById('pDesc').value,
                    images: urls
                }]);
                location.reload();
            } catch (e) { alert("حدث خطأ"); }
        }

        async function init() {
            const { data } = await _client.from('products').select('*').order('created_at', {ascending: false});
            productsStore = data || [];
            const grid = document.getElementById('gallery');
            const sess = await _client.auth.getSession();
            const isAdmin = sess.data.session;

            grid.innerHTML = productsStore.map(p => `
                <div class="bag-card group cursor-pointer" onclick="openModal('${p.id}')">
                    <div class="relative h-80 overflow-hidden rounded-[2rem] mb-6">
                        <img src="${p.images[0]}" class="w-full h-full object-cover transition duration-700 group-hover:scale-110">
                        <div class="absolute bottom-4 left-4 bg-white/90 px-4 py-2 rounded-full font-bold text-[#ff4d8d] shadow-lg">${p.price} SDG</div>
                    </div>
                    <div class="px-2">
                        <h3 class="font-title text-2xl text-gray-800 mb-2">${p.name}</h3>
                        ${isAdmin ? `
                        <div class="flex gap-4 mt-4" onclick="event.stopPropagation()">
                            <button onclick="editP('${p.id}')" class="flex-1 py-4 btn-secondary text-sm">تعديل ✍️</button>
                            <button onclick="deleteP('${p.id}')" class="flex-1 py-4 btn-secondary text-sm">حذف 🗑️</button>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');

            if(isAdmin) document.getElementById('adminZone').classList.remove('hidden-admin');
        }

        async function editP(id) {
            const p = productsStore.find(x => x.id == id);
            if(!p) return;
            
            const newName = prompt("تعديل اسم المنتج:", p.name);
            if (newName === null) return;
            
            const newPrice = prompt("تعديل السعر:", p.price);
            if (newPrice === null) return;
            
            const newDesc = prompt("تعديل المواصفات:", p.description || "");
            if (newDesc === null) return;

            try {
                await _client.from('products').update({
                    name: newName,
                    price: newPrice,
                    description: newDesc
                }).eq('id', id);
                location.reload();
            } catch (e) {
                alert("حدث خطأ أثناء التعديل");
            }
        }

        async function deleteP(id) { 
            if(confirm("هل أنت متأكد من الحذف؟")) { 
                await _client.from('products').delete().eq('id', id); 
                location.reload(); 
            } 
        }
        
        init();
    </script>
</body>
</html>
