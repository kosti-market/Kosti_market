<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-NASR Luxury | النصر للفخامة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Plus+Jakarta+Sans:wght@300;500&family=Cairo:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --deep-black: #0a0a0a; --card-bg: #141414; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--deep-black); color: #fff; scroll-behavior: smooth; }
        .serif { font-family: 'Amiri', serif; }
        
        /* تأثيرات بصرية متقدمة */
        .glass-nav { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(212,175,55,0.1); }
        .product-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.03); transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .product-card:hover { transform: scale(1.02); border-color: var(--gold); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        
        /* إخفاء عناصر الإدارة تلقائياً */
        .admin-only { display: none; }
        .modal-blur { backdrop-filter: blur(20px); background: rgba(0,0,0,0.95); }
        
        /* أنيميشن */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .reveal { animation: fadeIn 0.8s ease forwards; }
    </style>
</head>
<body>

    <nav class="glass-nav fixed top-0 w-full z-[100] px-8 py-5 flex justify-between items-center">
        <div class="serif text-3xl font-bold text-[#d4af37] tracking-wider">AL-NASR</div>
        <div class="flex gap-6 items-center">
            <a href="#collection" class="text-[11px] font-bold uppercase tracking-[0.2em] hover:text-[#d4af37] transition">المجموعة</a>
            <a href="https://wa.me/249900623733" class="bg-[#d4af37] text-black px-5 py-2 rounded-full text-xs font-bold">تواصل معنا</a>
        </div>
    </nav>

    <section class="h-[80vh] flex flex-col justify-center items-center text-center px-6 relative">
        <div class="reveal">
            <span class="text-[#d4af37] text-[10px] font-bold tracking-[0.6em] mb-4 block uppercase">The Peak of Handcraft</span>
            <h1 class="serif text-6xl md:text-8xl mb-8 leading-tight">فن صياغة <br><span class="italic font-light text-gray-400">الجلود النادرة</span></h1>
            <p class="max-w-xl text-gray-500 text-lg font-light leading-relaxed mb-10">قطع فنية تُصنع يدوياً في كوستي، مصممة لأولئك الذين لا يقبلون بأقل من الكمال.</p>
        </div>
    </section>

    <section id="collection" class="py-20 max-w-7xl mx-auto px-6">
        <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            </div>
    </section>

    <section id="adminSection" class="admin-only py-20 bg-[#0f0f0f] border-t border-[#d4af37]/20">
        <div class="max-w-2xl mx-auto p-10 bg-white/5 rounded-[2.5rem]">
            <h2 class="text-2xl font-bold mb-8 text-[#d4af37]">إضافة قطعة جديدة للمخزن</h2>
            <div class="space-y-4">
                <input type="text" id="pName" placeholder="اسم المنتج" class="w-full bg-black/40 border-none p-5 rounded-2xl outline-none">
                <input type="number" id="pPrice" placeholder="السعر" class="w-full bg-black/40 border-none p-5 rounded-2xl outline-none">
                <textarea id="pDesc" placeholder="وصف القطعة..." class="w-full bg-black/40 border-none p-5 rounded-2xl h-32 outline-none"></textarea>
                <input type="file" id="pFiles" multiple class="block w-full text-sm text-gray-500 file:bg-[#d4af37] file:text-black file:px-6 file:py-2 file:rounded-full file:border-0 cursor-pointer">
                <button onclick="uploadProduct()" id="uploadBtn" class="w-full py-5 bg-[#d4af37] text-black rounded-2xl font-black uppercase tracking-widest">نشر القطعة</button>
            </div>
        </div>
    </section>

    <footer class="py-20 text-center border-t border-white/5">
        <p class="text-xs text-gray-600 mb-6">AL-NASR LUXURY © 2026 - KOSTI</p>
        <button onclick="showLogin()" class="text-[9px] text-gray-800 hover:text-gray-400 tracking-widest uppercase italic">بوابة المالك</button>
    </footer>

    <div id="productModal" class="fixed inset-0 z-[200] hidden modal-blur p-4 md:p-10">
        <div class="bg-[#141414] w-full max-w-6xl mx-auto rounded-[3rem] h-full overflow-y-auto flex flex-col md:flex-row relative">
            <button onclick="closeModal()" class="absolute top-8 left-8 z-[210] bg-black/50 p-4 rounded-full">✕</button>
            
            <div class="md:w-1/2 bg-black flex flex-col">
                <div class="h-[500px] w-full">
                    <img id="mainModalImg" class="w-full h-full object-cover">
                </div>
                <div id="thumbContainer" class="flex gap-2 p-4 overflow-x-auto bg-black/20"></div>
            </div>

            <div class="md:w-1/2 p-12 flex flex-col justify-center">
                <h3 id="modalTitle" class="serif text-4xl mb-4 text-[#d4af37]"></h3>
                <p id="modalPrice" class="text-2xl font-bold mb-8"></p>
                <div class="bg-white/5 p-6 rounded-2xl mb-8">
                    <p id="modalDesc" class="text-gray-400 leading-relaxed"></p>
                </div>
                
                <div class="flex gap-4">
                    <button id="waOrderBtn" class="flex-1 bg-[#d4af37] text-black py-5 rounded-2xl font-bold shadow-xl">طلب عبر واتساب</button>
                    <button id="dlBtn" class="bg-white/10 p-5 rounded-2xl hover:bg-white/20 transition">
                        <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                    </button>
                </div>
                <p class="text-[10px] text-gray-600 mt-4 text-center italic text-right">ملاحظة: يمكنك حفظ الصورة وإرسالها لتسهيل الطلب.</p>
            </div>
        </div>
    </div>

    <div id="loginModal" class="fixed inset-0 z-[300] hidden bg-black/95 flex items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <h3 class="serif text-2xl mb-8 text-[#d4af37]">تسجيل دخول المالك</h3>
            <input type="email" id="adminEmail" placeholder="البريد الإلكتروني" class="w-full bg-transparent border-b border-gray-800 py-4 mb-6 outline-none text-center">
            <input type="password" id="adminPass" placeholder="كلمة المرور" class="w-full bg-transparent border-b border-gray-800 py-4 mb-10 outline-none text-center">
            <button onclick="handleLogin()" class="w-full bg-[#d4af37] text-black py-4 rounded-full font-bold">دخول</button>
            <button onclick="hideLogin()" class="mt-6 text-gray-500 text-xs">إلغاء</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://bxbglomvulnzehruubdh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4Ymdsb212dWxuemVocnV1YmRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mzg5MDYsImV4cCI6MjA5MjUxNDkwNn0.rqIZHvP47QugH9vG0LW8OkkmAVYEzhOwv-VUKJuEqOY';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let productsData = [];

        function showLogin() { document.getElementById('loginModal').style.display = 'flex'; }
        function hideLogin() { document.getElementById('loginModal').style.display = 'none'; }

        async function handleLogin() {
            const { data, error } = await _supabase.auth.signInWithPassword({
                email: document.getElementById('adminEmail').value,
                password: document.getElementById('adminPass').value
            });
            if (error) alert("بيانات خاطئة");
            else {
                hideLogin();
                document.getElementById('adminSection').style.display = 'block';
                renderProducts(); // لإظهار أزرار الحذف
            }
        }

        async function uploadProduct() {
            const btn = document.getElementById('uploadBtn');
            const files = document.getElementById('pFiles').files;
            btn.innerText = "جاري الحفظ...";
            try {
                let imageUrls = [];
                for (let file of files) {
                    const fName = `${Date.now()}_${file.name}`;
                    await _supabase.storage.from('product-images').upload(fName, file);
                    const { data: urlData } = _supabase.storage.from('product-images').getPublicUrl(fName);
                    imageUrls.push(urlData.publicUrl);
                }
                await _supabase.from('products').insert([{
                    name: document.getElementById('pName').value,
                    price: document.getElementById('pPrice').value,
                    description: document.getElementById('pDesc').value,
                    images: imageUrls
                }]);
                location.reload();
            } catch (e) { alert("حدث خطأ"); }
        }

        async function deleteProduct(id) {
            if(confirm("حذف هذه القطعة؟")) {
                await _supabase.from('products').delete().eq('id', id);
                location.reload();
            }
        }

        function openModal(id) {
            const p = productsData.find(x => x.id == id);
            document.getElementById('modalTitle').innerText = p.name;
            document.getElementById('modalPrice').innerText = `${p.price} SDG`;
            document.getElementById('modalDesc').innerText = p.description || "لا يوجد وصف حالياً";
            document.getElementById('mainModalImg').src = p.images[0];
            
            // عرض الصور المتعددة
            const thumbDiv = document.getElementById('thumbContainer');
            thumbDiv.innerHTML = p.images.map(img => `
                <img src="${img}" onclick="document.getElementById('mainModalImg').src='${this.src}'" class="w-16 h-16 object-cover rounded-xl border border-white/10 cursor-pointer hover:border-[#d4af37]">
            `).join('');

            // رسالة الواتساب الذكية
            const msg = encodeURIComponent(`مرحباً النصر، أود طلب هذه القطعة الفاخرة:\n\nالاسم: ${p.name}\nالسعر: ${p.price} SDG\nالوصف: ${p.description}\n\nشكراً لك.`);
            document.getElementById('waOrderBtn').onclick = () => window.open(`https://wa.me/249900623733?text=${msg}`);
            
            // تحميل الصورة مباشر
            document.getElementById('dlBtn').onclick = async () => {
                const response = await fetch(p.images[0]);
                const blob = await response.blob();
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `${p.name}.jpg`;
                link.click();
            };

            document.getElementById('productModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        async function renderProducts() {
            const { data } = await _supabase.from('products').select('*').order('created_at', {ascending: false});
            productsData = data || [];
            const grid = document.getElementById('productsGrid');
            const session = await _supabase.auth.getSession();
            const isAdmin = session.data.session;

            grid.innerHTML = productsData.map(p => `
                <div class="product-card rounded-[2.5rem] overflow-hidden p-3 relative group">
                    <div class="relative aspect-[4/5] overflow-hidden rounded-[2rem] cursor-pointer" onclick="openModal('${p.id}')">
                        <img src="${p.images[0]}" class="w-full h-full object-cover transition duration-[1.5s] group-hover:scale-110">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                            <span class="border border-white/50 px-6 py-2 rounded-full text-[10px] uppercase tracking-widest">عرض التفاصيل</span>
                        </div>
                    </div>
                    <div class="p-5 flex justify-between items-start">
                        <div>
                            <h3 class="serif text-xl mb-1">${p.name}</h3>
                            <p class="text-[#d4af37] font-bold text-sm">${p.price} SDG</p>
                        </div>
                        ${isAdmin ? `<button onclick="deleteProduct('${p.id}')" class="text-red-800 text-[10px] underline">حذف</button>` : ''}
                    </div>
                </div>
            `).join('');
            
            if(isAdmin) document.getElementById('adminSection').style.display = 'block';
        }

        renderProducts();
    </script>
</body>
</html>
